<!DOCTYPE html>
<html>
<head>
    <title>CSS Auto Slideshow</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .slideshow {
            position: relative;
            width: 80%;
            max-width: 700px;
            height: 400px;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .slides {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            animation: fade 12s infinite;
        }

        .slides img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Each slide delay */
        .slides:nth-child(1) { animation-delay: 0s; }
        .slides:nth-child(2) { animation-delay: 4s; }
        .slides:nth-child(3) { animation-delay: 8s; }

        /* Fade animation */
        @keyframes fade {
            0% { opacity: 0; }
            10% { opacity: 1; }
            30% { opacity: 1; }
            40% { opacity: 0; }
            100% { opacity: 0; }
        }

        @media (max-width: 600px) {
            .slideshow {
                height: 250px;
            }
        }
    </style>
</head>

<body>

<div class="slideshow">

    <div class="slides">
        <img src="https://picsum.photos/id/1015/1000/600">
    </div>

    <div class="slides">
        <img src="https://picsum.photos/id/1016/1000/600">
    </div>

    <div class="slides">
        <img src="https://picsum.photos/id/1018/1000/600">
    </div>

</div>

</body>
</html>
